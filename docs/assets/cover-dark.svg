<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="HydroShot — native screenshot and annotation tool">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#090c0d"/>
      <stop offset="1" stop-color="#0e1214"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>

  <!-- ============ top: wordmark ============ -->
  <g font-family="'Cascadia Code','JetBrains Mono',Consolas,'DejaVu Sans Mono',monospace" text-anchor="middle">
    <text x="600" y="118" font-size="18" font-weight="700" letter-spacing="5" fill="#879994"><tspan fill="#63f2ab">&#10095;</tspan>&#160;NATIVE · RUST · NO ELECTRON</text>
    <text x="600" y="214" font-size="86" font-weight="700" letter-spacing="2"><tspan fill="#dce4df">HYDRO</tspan><tspan fill="#63f2ab">SHOT</tspan></text>
    <line x1="360" y1="248" x2="840" y2="248" stroke="#2a363d" stroke-width="2"/>
    <text x="600" y="292" font-size="18" font-weight="600" letter-spacing="4.5" fill="#879994">CAPTURE · ANNOTATE · PIN · EXPORT</text>
  </g>

  <!-- ============ bottom: capture-overlay mock ============ -->
  <g>
    <!-- window frame -->
    <rect x="300" y="352" width="600" height="300" rx="12" fill="#0e1214" stroke="#2a363d" stroke-width="1.5"/>
    <line x1="300" y1="392" x2="900" y2="392" stroke="#2a363d" stroke-width="1.5"/>
    <circle cx="328" cy="372" r="5" fill="#ff6e7a"/>
    <circle cx="348" cy="372" r="5" fill="#f0c674"/>
    <circle cx="368" cy="372" r="5" fill="#63f2ab"/>
    <text x="398" y="377" font-family="'Cascadia Code','JetBrains Mono',Consolas,monospace" font-size="12" font-weight="700" letter-spacing="1.5" fill="#879994">HYDROSHOT &#8212; REGION CAPTURE</text>

    <!-- dimmed desktop with two faux windows -->
    <rect x="300" y="392" width="600" height="260" fill="#090c0d"/>
    <rect x="330" y="418" width="250" height="150" rx="7" fill="#13191c" stroke="#2a363d" stroke-width="1" opacity="0.5"/>
    <rect x="620" y="452" width="230" height="176" rx="7" fill="#13191c" stroke="#2a363d" stroke-width="1" opacity="0.5"/>

    <!-- bright selection -->
    <rect x="438" y="430" width="324" height="150" fill="#0e1214"/>
    <rect x="438" y="430" width="324" height="150" fill="none" stroke="#63f2ab" stroke-width="1.6"/>
    <g fill="#dce4df" stroke="#63f2ab" stroke-width="1">
      <rect x="434" y="426" width="8" height="8" rx="1.5"/>
      <rect x="758" y="426" width="8" height="8" rx="1.5"/>
      <rect x="434" y="576" width="8" height="8" rx="1.5"/>
      <rect x="758" y="576" width="8" height="8" rx="1.5"/>
    </g>
    <!-- an arrow annotation inside the selection -->
    <line x1="470" y1="556" x2="560" y2="470" stroke="#ff6e7a" stroke-width="4" stroke-linecap="round"/>
    <path d="M560 470 l-18 3 l8 11 z" fill="#ff6e7a"/>
    <!-- a step marker -->
    <circle cx="700" cy="500" r="13" fill="#6bdcff"/>
    <text x="700" y="505" text-anchor="middle" font-family="'Cascadia Code','JetBrains Mono',Consolas,monospace" font-size="14" font-weight="700" fill="#07100d">1</text>
    <!-- size label -->
    <rect x="686" y="586" width="78" height="21" rx="4" fill="#0e1214" stroke="#2a363d" stroke-width="1"/>
    <text x="725" y="600" text-anchor="middle" font-family="'Cascadia Code','JetBrains Mono',Consolas,monospace" font-size="11" fill="#dce4df">960 × 540</text>

    <!-- floating toolbar: tools | colors | actions -->
    <rect x="468" y="600" width="264" height="36" rx="9" fill="#0e1214" stroke="#2a363d" stroke-width="1"/>
    <g font-family="'Cascadia Code','JetBrains Mono',Consolas,monospace" font-size="14" fill="#879994">
      <text x="486" y="623">&#9635;</text>
      <text x="512" y="623">&#8594;</text>
      <text x="538" y="623" fill="#dce4df">Aa</text>
    </g>
    <line x1="568" y1="608" x2="568" y2="628" stroke="#2a363d" stroke-width="1"/>
    <rect x="580" y="611" width="14" height="14" rx="3" fill="#ff6e7a"/>
    <rect x="600" y="611" width="14" height="14" rx="3" fill="#6bdcff"/>
    <rect x="620" y="611" width="14" height="14" rx="3" fill="#63f2ab"/>
    <rect x="640" y="611" width="14" height="14" rx="3" fill="#f0c674"/>
    <rect x="660" y="611" width="14" height="14" rx="3" fill="#b78cff"/>
    <line x1="688" y1="608" x2="688" y2="628" stroke="#2a363d" stroke-width="1"/>
    <text x="700" y="623" font-family="'Cascadia Code','JetBrains Mono',Consolas,monospace" font-size="13" fill="#63f2ab">&#9112;</text>
  </g>
</svg>
