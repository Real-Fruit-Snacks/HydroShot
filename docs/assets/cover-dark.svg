<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" width="1200" height="460" role="img" aria-label="HydroShot — a fast native screenshot and annotation tool, with a preview of its capture overlay">
  <title>HydroShot</title>
  <rect x="0.75" y="0.75" width="1198.5" height="458.5" rx="24" fill="#090c0d" stroke="#2a363d" stroke-width="1.5"/>

  <!-- left column -->
  <text x="68" y="128" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="15" font-weight="600" letter-spacing="2.2" fill="#63736f">CAPTURE · ANNOTATE · PIN</text>
  <text x="66" y="204" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="58" font-weight="700" letter-spacing="0.5" fill="#dce4df">hydro</text>
  <text x="66" y="268" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="58" font-weight="700" letter-spacing="0.5" fill="#dce4df">shot</text>
  <rect x="214" y="224" width="13" height="44" rx="2" fill="#63f2ab"/>
  <text x="68" y="326" font-family="ui-sans-serif, system-ui, 'Segoe UI', Roboto, sans-serif" font-size="21" fill="#879994">Quiet capture. <tspan fill="#63f2ab" font-weight="600">Loud annotation.</tspan></text>
  <text x="68" y="384" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="12.5" letter-spacing="1.6" fill="#63736f">REGION · WINDOW · OCR · PIN · IMGUR · DARK + LIGHT</text>

  <!-- right column: mock capture overlay -->
  <rect x="624" y="64" width="512" height="332" rx="14" fill="#13191c" stroke="#2a363d" stroke-width="1.5"/>
  <path d="M638 64 h484 a14 14 0 0 1 14 14 v30 h-512 v-30 a14 14 0 0 1 14 -14 z" fill="#182024"/>
  <line x1="624" y1="108" x2="1136" y2="108" stroke="#2a363d" stroke-width="1"/>
  <circle cx="648" cy="86" r="5.5" fill="#ff6e7a"/>
  <circle cx="668" cy="86" r="5.5" fill="#f0c674"/>
  <circle cx="688" cy="86" r="5.5" fill="#63f2ab"/>
  <text x="714" y="90" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="12" fill="#63736f">capture — region 1920 × 1080</text>

  <!-- selection rectangle over a dimmed shot -->
  <rect x="648" y="132" width="426" height="176" rx="6" fill="#0e1214" stroke="#2a363d" stroke-width="1"/>
  <rect x="690" y="156" width="342" height="120" rx="4" fill="none" stroke="#63f2ab" stroke-width="1.5"/>
  <circle cx="690" cy="156" r="3.5" fill="#dce4df" stroke="#63f2ab" stroke-width="1"/>
  <circle cx="1032" cy="156" r="3.5" fill="#dce4df" stroke="#63f2ab" stroke-width="1"/>
  <circle cx="690" cy="276" r="3.5" fill="#dce4df" stroke="#63f2ab" stroke-width="1"/>
  <circle cx="1032" cy="276" r="3.5" fill="#dce4df" stroke="#63f2ab" stroke-width="1"/>
  <!-- an arrow annotation -->
  <line x1="726" y1="248" x2="838" y2="192" stroke="#ff6e7a" stroke-width="3" stroke-linecap="round"/>
  <path d="M838 192 l-16 2 l7 10 z" fill="#ff6e7a"/>
  <!-- a step marker -->
  <circle cx="972" cy="234" r="13" fill="#6bdcff"/>
  <text x="972" y="239" text-anchor="middle" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="14" font-weight="700" fill="#07100d">1</text>
  <!-- size label pill -->
  <rect x="946" y="282" width="86" height="22" rx="4" fill="#0e1214" stroke="#2a363d" stroke-width="1"/>
  <text x="989" y="297" text-anchor="middle" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="12" fill="#dce4df">342 × 120</text>

  <!-- floating toolbar: tools | colors | actions -->
  <rect x="648" y="332" width="426" height="44" rx="10" fill="#0e1214" stroke="#2a363d" stroke-width="1"/>
  <!-- tool glyphs -->
  <text x="672" y="360" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="15" fill="#879994">▧</text>
  <text x="702" y="360" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="15" fill="#879994">→</text>
  <text x="732" y="360" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="15" fill="#879994">▭</text>
  <text x="762" y="360" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="15" fill="#879994">◯</text>
  <text x="792" y="360" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="15" fill="#dce4df">Aa</text>
  <line x1="826" y1="342" x2="826" y2="366" stroke="#2a363d" stroke-width="1"/>
  <!-- color swatches -->
  <rect x="842" y="346" width="16" height="16" rx="3" fill="#ff6e7a"/>
  <rect x="866" y="346" width="16" height="16" rx="3" fill="#6bdcff"/>
  <rect x="890" y="346" width="16" height="16" rx="3" fill="#63f2ab"/>
  <rect x="914" y="346" width="16" height="16" rx="3" fill="#f0c674"/>
  <rect x="938" y="346" width="16" height="16" rx="3" fill="#b78cff"/>
  <line x1="972" y1="342" x2="972" y2="366" stroke="#2a363d" stroke-width="1"/>
  <!-- action glyphs -->
  <text x="990" y="360" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="14" fill="#63f2ab">⧉</text>
  <text x="1018" y="360" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="14" fill="#879994">▽</text>
  <text x="1046" y="360" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="14" fill="#879994">◈</text>
</svg>
