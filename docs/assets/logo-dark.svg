<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="crosshair-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cba6f7"/>
      <stop offset="100%" stop-color="#f5c2e7"/>
    </linearGradient>
    <filter id="center-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Capture frame (dashed square border) -->
  <rect x="20" y="20" width="80" height="80" rx="4"
        stroke="#cba6f7" stroke-width="2" stroke-dasharray="8 4"
        fill="none" opacity="0.85"/>

  <!-- Corner brackets (capture region indicators) -->
  <!-- Top-left -->
  <path d="M16,30 L16,16 L30,16" stroke="#cba6f7" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Top-right -->
  <path d="M90,16 L104,16 L104,30" stroke="#cba6f7" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Bottom-left -->
  <path d="M16,90 L16,104 L30,104" stroke="#cba6f7" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Bottom-right -->
  <path d="M90,104 L104,104 L104,90" stroke="#cba6f7" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Crosshair lines (+ shape, pink) -->
  <line x1="60" y1="28" x2="60" y2="50" stroke="#f5c2e7" stroke-width="2" stroke-linecap="round"/>
  <line x1="60" y1="70" x2="60" y2="92" stroke="#f5c2e7" stroke-width="2" stroke-linecap="round"/>
  <line x1="28" y1="60" x2="50" y2="60" stroke="#f5c2e7" stroke-width="2" stroke-linecap="round"/>
  <line x1="70" y1="60" x2="92" y2="60" stroke="#f5c2e7" stroke-width="2" stroke-linecap="round"/>

  <!-- Center dot with glow -->
  <circle cx="60" cy="60" r="4" fill="#cba6f7" filter="url(#center-glow)" opacity="0.95"/>
</svg>
