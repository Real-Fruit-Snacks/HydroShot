<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" fill="none">
  <defs>
    <!-- Primary gradient: violet to pink -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="40%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>

    <!-- Accent gradient: pink to violet -->
    <linearGradient id="g2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <!-- Icon gradient: vertical for the mark -->
    <linearGradient id="g3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>

    <!-- Subtle glow for the logomark -->
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feFlood flood-color="#7c3aed" flood-opacity="0.1" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feComposite in="SourceGraphic" in2="shadow" operator="over"/>
    </filter>

    <!-- Center dot glow -->
    <filter id="centerglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ===================== LOGOMARK ===================== -->
  <g transform="translate(58, 40)" filter="url(#softglow)">

    <!-- Hexagonal frame — thin, elegant -->
    <path d="M 80 6 L 140 38 L 140 102 L 80 134 L 20 102 L 20 38 Z"
          fill="none" stroke="url(#g1)" stroke-width="1.5" opacity="0.35"/>

    <!-- Inner hex subtle fill -->
    <path d="M 80 14 L 134 42 L 134 98 L 80 126 L 26 98 L 26 42 Z"
          fill="#7c3aed" opacity="0.04"/>

    <!-- Capture frame — dashed square -->
    <rect x="48" y="38" width="64" height="64" rx="3"
          stroke="#7c3aed" stroke-width="2" stroke-dasharray="8 4"
          fill="none" opacity="0.65"/>

    <!-- Corner brackets — capture region indicators -->
    <!-- Top-left -->
    <path d="M 42,50 L 42,32 L 60,32" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.8"/>
    <!-- Top-right -->
    <path d="M 100,32 L 118,32 L 118,50" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.8"/>
    <!-- Bottom-left -->
    <path d="M 42,90 L 42,108 L 60,108" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.8"/>
    <!-- Bottom-right -->
    <path d="M 100,108 L 118,108 L 118,90" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.8"/>

    <!-- Crosshair lines — + shape -->
    <line x1="80" y1="44" x2="80" y2="62" stroke="#ec4899" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
    <line x1="80" y1="78" x2="80" y2="96" stroke="#ec4899" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
    <line x1="54" y1="70" x2="72" y2="70" stroke="#ec4899" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
    <line x1="88" y1="70" x2="106" y2="70" stroke="#ec4899" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>

    <!-- Center dot with glow — bright node -->
    <circle cx="80" cy="70" r="5" fill="url(#g3)" opacity="0.9" filter="url(#centerglow)"/>
    <circle cx="80" cy="70" r="2.5" fill="#ffffff"/>
    <circle cx="80" cy="70" r="8" fill="none" stroke="#7c3aed" stroke-width="0.5" opacity="0.25"/>

    <!-- Corner bracket accent nodes -->
    <circle cx="42" cy="32" r="2" fill="#7c3aed" opacity="0.55"/>
    <circle cx="118" cy="32" r="2" fill="#a855f7" opacity="0.55"/>
    <circle cx="42" cy="108" r="2" fill="#a855f7" opacity="0.55"/>
    <circle cx="118" cy="108" r="2" fill="#ec4899" opacity="0.55"/>

    <!-- Subtle particles along crosshair lines -->
    <circle cx="80" cy="48" r="1.2" fill="#ec4899" opacity="0.35"/>
    <circle cx="80" cy="92" r="1.2" fill="#ec4899" opacity="0.35"/>
    <circle cx="58" cy="70" r="1.2" fill="#7c3aed" opacity="0.35"/>
    <circle cx="102" cy="70" r="1.2" fill="#7c3aed" opacity="0.35"/>

    <!-- Corner accents on hex -->
    <circle cx="80" cy="6" r="2" fill="#a855f7" opacity="0.25"/>
    <circle cx="80" cy="134" r="2" fill="#ec4899" opacity="0.25"/>
  </g>

  <!-- ===================== TYPOGRAPHY ===================== -->

  <!-- "HYDROSHOT" — clean, bold, wide-tracked -->
  <text x="430" y="108"
        font-family="'SF Pro Display', 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="58" font-weight="800" letter-spacing="14"
        fill="url(#g1)" text-anchor="middle">HYDROSHOT</text>

  <!-- Thin separator line -->
  <line x1="270" y1="128" x2="590" y2="128"
        stroke="url(#g1)" stroke-width="0.8" opacity="0.2"/>

  <!-- Tagline — refined, subtle -->
  <text x="430" y="152"
        font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace"
        font-size="11.5" font-weight="400" letter-spacing="5.5"
        fill="#57534e" text-anchor="middle">SCREENSHOT CAPTURE &amp; ANNOTATE</text>

  <!-- Version / descriptor — very subtle -->
  <text x="430" y="172"
        font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace"
        font-size="9" font-weight="400" letter-spacing="3"
        fill="#a8a29e" text-anchor="middle">RUST · WINIT · TINY-SKIA</text>
</svg>
