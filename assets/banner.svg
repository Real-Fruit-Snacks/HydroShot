<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="840" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#11111b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cba6f7"/>
      <stop offset="100%" stop-color="#f5c2e7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="840" height="200" rx="12" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="40" x2="840" y2="40" stroke="#cdd6f4" stroke-width="1"/>
    <line x1="0" y1="80" x2="840" y2="80" stroke="#cdd6f4" stroke-width="1"/>
    <line x1="0" y1="120" x2="840" y2="120" stroke="#cdd6f4" stroke-width="1"/>
    <line x1="0" y1="160" x2="840" y2="160" stroke="#cdd6f4" stroke-width="1"/>
    <line x1="168" y1="0" x2="168" y2="200" stroke="#cdd6f4" stroke-width="1"/>
    <line x1="336" y1="0" x2="336" y2="200" stroke="#cdd6f4" stroke-width="1"/>
    <line x1="504" y1="0" x2="504" y2="200" stroke="#cdd6f4" stroke-width="1"/>
    <line x1="672" y1="0" x2="672" y2="200" stroke="#cdd6f4" stroke-width="1"/>
  </g>

  <!-- Crosshair Capture logomark -->
  <g transform="translate(160, 100)" filter="url(#glow)">
    <!-- Capture frame (dashed border, mauve) -->
    <rect x="-36" y="-36" width="72" height="72" rx="3"
          stroke="#cba6f7" stroke-width="2" stroke-dasharray="8 4"
          fill="none" opacity="0.7"/>

    <!-- Corner brackets -->
    <path d="M-42,-30 L-42,-42 L-30,-42" stroke="#cba6f7" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.9"/>
    <path d="M30,-42 L42,-42 L42,-30" stroke="#cba6f7" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.9"/>
    <path d="M-42,30 L-42,42 L-30,42" stroke="#cba6f7" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.9"/>
    <path d="M30,42 L42,42 L42,30" stroke="#cba6f7" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.9"/>

    <!-- Crosshair lines (pink) -->
    <line x1="0" y1="-42" x2="0" y2="-14" stroke="#f5c2e7" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="14" x2="0" y2="42" stroke="#f5c2e7" stroke-width="2" stroke-linecap="round"/>
    <line x1="-42" y1="0" x2="-14" y2="0" stroke="#f5c2e7" stroke-width="2" stroke-linecap="round"/>
    <line x1="14" y1="0" x2="42" y2="0" stroke="#f5c2e7" stroke-width="2" stroke-linecap="round"/>

    <!-- Center dot with glow -->
    <circle cx="0" cy="0" r="4" fill="#cba6f7" opacity="0.95"/>
  </g>

  <!-- Title -->
  <text x="270" y="88" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="58" font-weight="700" fill="#cdd6f4" letter-spacing="-1">
    HYDRO<tspan fill="url(#accent)">SHOT</tspan>
  </text>

  <!-- Tagline -->
  <text x="272" y="118" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="14" fill="#a6adc8" letter-spacing="2" text-transform="uppercase">
    SCREENSHOT CAPTURE &amp; ANNOTATE
  </text>

  <!-- Tech badges -->
  <g transform="translate(272, 136)">
    <rect x="0" y="0" width="54" height="22" rx="4" fill="#313244"/>
    <text x="27" y="15" font-family="'Segoe UI', monospace" font-size="11" fill="#fab387" text-anchor="middle">RUST</text>

    <text x="65" y="15" font-family="'Segoe UI', monospace" font-size="11" fill="#585b70" text-anchor="middle">&middot;</text>

    <rect x="76" y="0" width="58" height="22" rx="4" fill="#313244"/>
    <text x="105" y="15" font-family="'Segoe UI', monospace" font-size="11" fill="#cba6f7" text-anchor="middle">WINIT</text>

    <text x="145" y="15" font-family="'Segoe UI', monospace" font-size="11" fill="#585b70" text-anchor="middle">&middot;</text>

    <rect x="156" y="0" width="82" height="22" rx="4" fill="#313244"/>
    <text x="197" y="15" font-family="'Segoe UI', monospace" font-size="11" fill="#f5c2e7" text-anchor="middle">TINY-SKIA</text>
  </g>

  <!-- Decorative accent line -->
  <rect x="270" y="172" width="120" height="2" rx="1" fill="url(#accent)" opacity="0.4"/>

  <!-- Border -->
  <rect width="840" height="200" rx="12" stroke="#313244" stroke-width="1" fill="none"/>
</svg>
