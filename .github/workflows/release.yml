name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release
        run: cargo build --release
      - name: Package
        run: |
          mkdir release
          cp target/release/hydroshot.exe release/
          Compress-Archive -Path release/hydroshot.exe -DestinationPath hydroshot-${{ github.ref_name }}-windows-x64.zip
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: hydroshot-*.zip

  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libxkbcommon-dev libwayland-dev
      - name: Build release
        run: cargo build --release
      - name: Package
        run: |
          mkdir release
          cp target/release/hydroshot release/
          chmod +x release/hydroshot
          tar -czf hydroshot-${{ github.ref_name }}-linux-x64.tar.gz -C release hydroshot
      - uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: hydroshot-*.tar.gz

  release:
    name: Create Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            hydroshot-*.zip
            hydroshot-*.tar.gz
          generate_release_notes: true
          draft: false
