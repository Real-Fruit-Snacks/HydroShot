# GitLab Pages deployment for the HydroShot website.
# Publishes the static docs/ site on every push to the default branch.
# No build step and no internet needed — the site (HTML, CSS, vendored
# Terminal Workbench Mono fonts, and SVGs) is served exactly as it sits
# in the repo, so it works fully offline / air-gapped.

pages:
  stage: deploy
  image: alpine:latest
  script:
    - mkdir -p public
    - cp -r docs/. public/
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
